version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geopost_db
    environment:
      POSTGRES_DB: geopost
      POSTGRES_USER: geopost_user
      POSTGRES_PASSWORD: geopost_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: geopost_redis
    ports:
      - "6379:6379"

volumes:
  pgdata: